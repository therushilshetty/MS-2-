<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StaticsMaster · Car Equilibrium</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══ CORE THEME ══ */
:root{
  --bg:#07090f;--surface:#0d1117;--surface2:#111827;--surface3:#162033;
  --border:rgba(56,189,248,.13);--divider:rgba(56,189,248,.07);
  --text:#e2eeff;--muted:#8ba3c9;--faint:#4a607e;
  --cyan:#38bdf8;--cyan-glow:rgba(56,189,248,.35);
  --violet:#a78bfa;--violet-glow:rgba(167,139,250,.3);
  --orange:#fb923c;--orange-glow:rgba(251,146,60,.15);
  --green:#34d399;--green-glow:rgba(52,211,153,.14);
  --rose:#fb7185;--rose-glow:rgba(251,113,133,.13);
  --yellow:#fbbf24;--yellow-glow:rgba(251,191,36,.13);
  --grid-line:rgba(56,189,248,.04);
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --r-sm:8px;--r-md:14px;--r-lg:20px;
}
[data-theme="light"]{
  --bg:#f0f4fa;--surface:#fff;--surface2:#f5f9ff;--surface3:#eaf2ff;
  --border:rgba(14,80,180,.10);--divider:rgba(14,80,180,.06);
  --text:#0f172a;--muted:#4b6b96;--faint:#94a3b8;
  --cyan:#0284c7;--cyan-glow:rgba(2,132,199,.10);
  --violet:#7c3aed;--violet-glow:rgba(124,58,237,.10);
  --orange:#ea580c;--orange-glow:rgba(234,88,12,.10);
  --green:#059669;--green-glow:rgba(5,150,105,.10);
  --rose:#e11d48;--rose-glow:rgba(225,29,72,.10);
  --yellow:#d97706;--yellow-glow:rgba(217,119,6,.10);
  --grid-line:rgba(14,80,180,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:40px 40px;color:var(--text);min-height:100vh;
}

/* ══ LAYOUT ══ */
.hdr{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:56px;background:color-mix(in srgb,var(--surface) 85%,transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;box-shadow:0 0 20px var(--cyan-glow)}
.brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.4px;text-transform:uppercase}
.hdr-r{display:flex;gap:8px;align-items:center}
.pill{padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--border);color:var(--cyan);background:var(--cyan-glow)}
.sym-pill{color:var(--violet);background:var(--violet-glow);border-color:rgba(167,139,250,.25)}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);display:grid;place-items:center;transition:.2s}
.icon-btn:hover{border-color:var(--cyan);background:var(--cyan-glow);box-shadow: 0 0 10px var(--cyan-glow)}

.layout{display:grid;grid-template-columns:355px 1fr;min-height:calc(100vh - 56px)}
.sidebar{padding:16px;border-right:1px solid var(--border);background:color-mix(in srgb,var(--surface) 70%,transparent);display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.main-col{padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}

/* ══ CARDS & INPUTS ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow: 0 4px 20px rgba(0,0,0,0.2)}
.card-pad{padding:16px}
.card-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.ibox{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.ib-cyan{background:var(--cyan-glow);color:var(--cyan);border:1px solid rgba(56,189,248,.25)}
.ib-violet{background:var(--violet-glow);color:var(--violet);border:1px solid rgba(167,139,250,.25)}
.ib-orange{background:var(--orange-glow);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.ib-green{background:var(--green-glow);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.ct{font-size:12px;font-weight:700}.cs{font-size:10px;color:var(--muted);margin-top:1px}

.slabel{font-size:9px;font-weight:700;font-family:var(--mono);color:var(--faint);letter-spacing:1px;text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--divider);margin:4px 0 8px}
.field label{display:flex;justify-content:space-between;align-items:center;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.iw input{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;transition:.2s;color:var(--text)}
.iw input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.iw input.sym{border-color:rgba(167,139,250,.5);color:var(--violet);font-family:var(--mono);background:rgba(167,139,250,.05)}

.solve-btn{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--cyan),var(--violet),var(--orange));box-shadow:0 4px 20px var(--cyan-glow);transition:.25s;position:relative;margin-top:10px}
.solve-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--cyan-glow)}

.sym-banner{display:none;padding:9px 12px;border-radius:10px;background:var(--violet-glow);border:1px solid rgba(167,139,250,.3);font-size:11px;color:var(--violet);line-height:1.6;margin-top:8px}
.sym-banner.on{display:block}

/* ══ RESULTS CHIPS ══ */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.chip{padding:10px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);text-align:center;position:relative;overflow:hidden;transition:.25s}
.ck{font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.cv{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1.2;word-break:break-all}
.cv.sym-val{font-size:11px;color:var(--violet)}
.cu{font-size:9px;color:var(--muted);margin-top:2px}
.chip.big{grid-column:1/-1;background:linear-gradient(135deg,rgba(56,189,248,.06),rgba(167,139,250,.06));border-color:rgba(56,189,248,.3)}
.chip.big .cv{font-size:18px;color:var(--cyan);text-shadow: 0 0 10px var(--cyan-glow)}

/* ══ CANVAS ZONE ══ */
.fbd-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:10px}
.tab{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;color:var(--muted);transition:.2s;border:none;background:none;cursor:pointer}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.canvas-zone{position:relative;background:radial-gradient(ellipse at 30% 40%,color-mix(in srgb,var(--cyan-glow) 60%,transparent),transparent 55%),radial-gradient(ellipse at 70% 70%,color-mix(in srgb,var(--violet-glow) 40%,transparent),transparent 50%),var(--bg);display:grid;place-items:center;padding:14px}
#fbdCanvas{border-radius:12px;width:100%;max-width:940px;height:auto;display:block;box-shadow:0 8px 40px rgba(0,0,0,.55)}

/* ══ STEPS & EQUATIONS ══ */
.step{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--divider)}
.snum{width:24px;height:24px;border-radius:999px;flex-shrink:0;display:grid;place-items:center;font:700 10px var(--mono);color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
.stitle{font-size:12px;font-weight:700;margin-bottom:2px}
.sdesc{font-size:11px;color:var(--muted);line-height:1.6}
.math{margin-top:5px;padding:6px 10px;border-radius:7px;background:var(--surface2);border-left:3px solid var(--cyan);font:11px var(--mono);color:var(--cyan);line-height:1.9}
.eqbox{padding:14px 16px;border-radius:12px;background:linear-gradient(135deg,rgba(56,189,248,.05),rgba(167,139,250,.05));border:1px solid rgba(56,189,248,.2);font:13px/1.9 var(--mono);word-break:break-all}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand"><div class="logo">SM</div><div><div class="brand-name">StaticsMaster</div><div class="brand-sub">CAR CENTER OF MASS</div></div></div>
  <div class="hdr-r"><div class="pill">Statics</div><div class="pill sym-pill" id="modeTag">NUMERIC</div></div>
</header>

<div class="layout">
<aside class="sidebar">
  <div class="card card-pad">
    <div class="card-head"><div class="ibox ib-cyan">📐</div><div><div class="ct">Inputs</div><div class="cs">Numbers or Symbols</div></div></div>
    <div class="slabel">Geometry</div>
    <div class="field-row">
      <div class="field"><label>Front → G</label><div class="iw"><input id="inp_df" value="1386"></div></div>
      <div class="field"><label>G → Rear</label><div class="iw"><input id="inp_dr" value="964"></div></div>
    </div>
    <div class="slabel">Physics</div>
    <div class="field-row">
      <div class="field"><label>Mass (kg)</label><div class="iw"><input id="inp_mass" value="1400"></div></div>
      <div class="field"><label>Gravity</label><div class="iw"><input id="inp_g" value="9.81"></div></div>
    </div>
    <button class="solve-btn" id="solveBtn">⚡ Solve &amp; Animate</button>
  </div>

  <div class="card card-pad" id="resultCard" style="display:none">
    <div class="rg">
      <div class="chip"><div class="ck">Weight W</div><div class="cv" id="r_W">—</div></div>
      <div class="chip"><div class="ck">Wheelbase L</div><div class="cv" id="r_L">—</div></div>
      <div class="chip big"><div class="ck">Front Tire N_f</div><div class="cv" id="r_tireF">—</div></div>
      <div class="chip big"><div class="ck">Rear Tire N_r</div><div class="cv" id="r_tireR">—</div></div>
    </div>
  </div>
</aside>

<main class="main-col">
  <section class="card">
    <div class="fbd-header">
      <div><div class="ct">Visual Solution</div></div>
      <div class="tabs">
        <button class="tab active" data-tab="fbd">FBD</button>
        <button class="tab" data-tab="geom">Geometry</button>
      </div>
    </div>
    <div class="canvas-zone"><canvas id="fbdCanvas" width="940" height="540"></canvas></div>
  </section>
  <section class="card card-pad"><div id="stepsWrap">Results will appear here.</div></section>
  <section class="card card-pad"><div class="eqbox" id="eqBox">ΣM = 0</div></section>
</main>
</div>

<script>
const canvas=document.getElementById('fbdCanvas'), ctx=canvas.getContext('2d');
let _P=null, _tab='fbd', _raf=null;

function TH(){ return { text:'#e2eeff', muted:'#8ba3c9', carLine:'#38bdf8', Nf:'#34d399', Nr:'#fbbf24', weight:'#fb7185', dim:'#a78bfa', pt:'#38bdf8', cvs:'#0d1117', grid:'rgba(56,189,248,.04)' }; }

function parseV(id){
  const raw=document.getElementById(id).value.trim();
  const n=parseFloat(raw);
  return isNaN(n)?{isNum:false,str:raw}:{isNum:true,num:n,str:raw};
}

function compute(){
  const df=parseV('inp_df'), dr=parseV('inp_dr'), m=parseV('inp_mass'), g=parseV('inp_g');
  const allNum = df.isNum && dr.isNum && m.isNum && g.isNum;
  const L = allNum ? (df.num + dr.num)/1000 : 2.35;
  return { df, dr, m, g, allNum, L };
}

function arw(x1,y1,x2,y2,col,p,lbl){
  if(p<=0) return;
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+(x2-x1)*p, y1+(y2-y1)*p); ctx.stroke();
  if(p>0.8 && lbl){ ctx.fillText(lbl, x2, y2-10); }
}

function dash(x1,y1,x2,y2,col,p,lbl){
  ctx.save(); ctx.setLineDash([5,5]); ctx.strokeStyle=col;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+(x2-x1)*p, y1+(y2-y1)*p); ctx.stroke();
  if(p>0.8 && lbl) ctx.fillText(lbl, (x1+x2)/2, y1-10);
  ctx.restore();
}

function drawFBD(p,t){
  const Th=TH(); ctx.fillStyle=Th.cvs; ctx.fillRect(0,0,940,540);
  const Ax=200, Bx=740, By=400, Gx=450, Gy=320;
  arw(Ax,By,Ax,By-150,Th.Nf,t,'Nf');
  arw(Bx,By,Bx,By-150,Th.Nr,t,'Nr');
  arw(Gx,Gy,Gx,Gy+150,Th.weight,t,'W');
}

function drawGeom(p,t){
  const Th=TH(); ctx.fillStyle=Th.cvs; ctx.fillRect(0,0,940,540);
  const Ax=200, Bx=740, By=400, Gx=450, Gy=320;
  
  // Adjusted: d_f is now higher (By+40) and d_r is lower (By+80) to avoid cutting
  dash(Ax, By+40, Gx, By+40, Th.dim, t, `d_f: ${p.df.str}`);
  dash(Gx, By+80, Bx, By+80, Th.dim, t, `d_r: ${p.dr.str}`);
  
  // Connector lines from center point G down to the dimension levels
  ctx.setLineDash([2,2]); ctx.strokeStyle=Th.muted;
  ctx.beginPath(); ctx.moveTo(Gx, Gy); ctx.lineTo(Gx, By+90); ctx.stroke();
}

function animate(tab){
  let start=null; _tab=tab;
  function step(now){
    if(!start)start=now; const t=Math.min((now-start)/1000, 1);
    if(_tab==='fbd') drawFBD(_P,t); else drawGeom(_P,t);
    if(t<1) _raf=requestAnimationFrame(step);
  }
  if(_raf) cancelAnimationFrame(_raf);
  _raf=requestAnimationFrame(step);
}

document.getElementById('solveBtn').addEventListener('click',()=>{
  _P=compute(); document.getElementById('resultCard').style.display='block';
  animate(_tab);
});

document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',e=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active'); animate(e.target.dataset.tab);
}));
</script>
</body>
</html>
