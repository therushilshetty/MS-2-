<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StaticsMaster · Car Equilibrium</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══ CORE THEME ══ */
:root{
  --bg:#07090f;--surface:#0d1117;--surface2:#111827;--surface3:#162033;
  --border:rgba(56,189,248,.13);--divider:rgba(56,189,248,.07);
  --text:#e2eeff;--muted:#8ba3c9;--faint:#4a607e;
  --cyan:#38bdf8;--cyan-glow:rgba(56,189,248,.18);
  --violet:#a78bfa;--violet-glow:rgba(167,139,250,.15);
  --orange:#fb923c;--orange-glow:rgba(251,146,60,.15);
  --green:#34d399;--green-glow:rgba(52,211,153,.14);
  --rose:#fb7185;--rose-glow:rgba(251,113,133,.13);
  --grid-line:rgba(56,189,248,.04);
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --r-sm:8px;--r-md:14px;--r-lg:20px;
}
[data-theme="light"]{
  --bg:#f0f4fa;--surface:#fff;--surface2:#f5f9ff;--surface3:#eaf2ff;
  --border:rgba(14,80,180,.10);--divider:rgba(14,80,180,.06);
  --text:#0f172a;--muted:#4b6b96;--faint:#94a3b8;
  --cyan:#0284c7;--cyan-glow:rgba(2,132,199,.10);
  --violet:#7c3aed;--violet-glow:rgba(124,58,237,.10);
  --rose:#e11d48;--rose-glow:rgba(225,29,72,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:40px 40px;color:var(--text);min-height:100vh;}
button,input{font-family:var(--font);color:var(--text);border:none;outline:none;background:none;cursor:pointer}

/* ══ LAYOUT ══ */
.hdr{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:56px;background:color-mix(in srgb,var(--surface) 85%,transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#fff;box-shadow:0 0 20px var(--cyan-glow)}
.layout{display:grid;grid-template-columns:355px 1fr;min-height:calc(100vh - 56px)}
.sidebar{padding:16px;border-right:1px solid var(--border);background:color-mix(in srgb,var(--surface) 70%,transparent);display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.main-col{padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}

/* ══ CARDS ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-pad{padding:16px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.iw input{width:100%;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:12px;transition:.2s;color:var(--text)}
.iw input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.solve-btn{width:100%;padding:11px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--cyan),var(--violet),var(--orange));box-shadow:0 4px 20px rgba(56,189,248,.2);margin-top:10px}
.case-banner{padding:9px 12px;border-radius:9px;font-size:11px;line-height:1.6;margin-bottom:10px}
.cb-rose{background:var(--rose-glow);border:1px solid rgba(251,113,133,.3);color:var(--rose)}

/* ══ CANVAS ══ */
.canvas-zone{position:relative;background:var(--bg);display:grid;place-items:center;padding:14px;min-height:540px}
#fbdCanvas{border-radius:12px;width:100%;max-width:940px;height:auto;display:block;box-shadow:0 8px 40px rgba(0,0,0,.55)}
.tabs{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:10px}
.tab{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
.tab.active{background:var(--surface);color:var(--text)}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand"><div class="logo">SM</div><div><div class="brand-name">StaticsMaster</div></div></div>
  <div class="hdr-r"><div class="pill" id="modeTag">NUMERIC</div></div>
</header>

<div class="layout">
<aside class="sidebar">
  <div class="card card-pad">
    <div class="field-row">
      <div class="field"><label>Front Axle → G</label><div class="iw"><input id="inp_df" value="1386"></div></div>
      <div class="field"><label>G → Rear Axle</label><div class="iw"><input id="inp_dr" value="964"></div></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Mass (kg)</label><div class="iw"><input id="inp_mass" value="1400"></div></div>
      <div class="field"><label>Gravity (m/s²)</label><div class="iw"><input id="inp_g" value="9.81"></div></div>
    </div>
    <button class="solve-btn" id="solveBtn">⚡ Solve & Animate</button>
  </div>

  <div class="card card-pad" id="resultCard" style="display:none">
    <div id="caseBanner"></div>
    <div class="rg" id="resultsGrid">
      </div>
  </div>
</aside>

<main class="main-col">
  <section class="card">
    <div class="fbd-header" style="display:flex; justify-content:space-between; padding:12px;">
      <div class="ct">Free Body Diagram</div>
      <div class="tabs">
        <button class="tab active" data-tab="fbd">Full FBD</button>
        <button class="tab" data-tab="geom">Geometry</button>
      </div>
    </div>
    <div class="canvas-zone">
      <canvas id="fbdCanvas" width="940" height="540"></canvas>
    </div>
  </section>
</main>
</div>

<script>
const canvas = document.getElementById('fbdCanvas');
const ctx = canvas.getContext('2d');
let currentTab = 'fbd';
let currentData = null;

/* ══ CORE PHYSICS COMPUTE ══ */
function compute(){
  const df = parseFloat(document.getElementById('inp_df').value);
  const dr = parseFloat(document.getElementById('inp_dr').value);
  const m = parseFloat(document.getElementById('inp_mass').value);
  const g = parseFloat(document.getElementById('inp_g').value);

  if(isNaN(df) || isNaN(dr) || isNaN(m) || isNaN(g)) return null;

  const L = (df + dr) / 1000;
  const W = m * g;

  return {
    df_m: df/1000, dr_m: dr/1000, L, m, g, W,
    Nf: L !== 0 ? (W * (dr/1000)) / L : 0,
    Nr: L !== 0 ? (W * (df/1000)) / L : 0,
    isImpossible: m < 0 || L < 0 || g < 0,
    reason: m < 0 ? "Negative Mass" : L < 0 ? "Negative Wheelbase" : g < 0 ? "Negative Gravity" : ""
  };
}

/* ══ UI RENDER ══ */
function solve(){
  const p = compute();
  if(!p) return;
  currentData = p;
  
  const resCard = document.getElementById('resultCard');
  const banner = document.getElementById('caseBanner');
  resCard.style.display = 'block';

  if(p.isImpossible) {
    banner.innerHTML = `<div class="case-banner cb-rose">❌ <strong>Not Possible: ${p.reason}</strong><br>Physical values like mass and total wheelbase must be positive for static equilibrium.</div>`;
  } else {
    banner.innerHTML = "";
  }
  
  animate();
}

/* ══ DRAWING ══ */
function draw(progress) {
  const p = currentData;
  ctx.clearRect(0,0,940,540);
  
  if(p.isImpossible) {
    ctx.fillStyle = "#fb7185";
    ctx.font = "bold 24px Space Grotesk";
    ctx.textAlign = "center";
    ctx.fillText(`⚠️ PHYSICAL IMPOSSIBILITY: ${p.reason.toUpperCase()}`, 470, 270);
    return;
  }

  const groundY = 400;
  const scale = 200; 
  const Ax = 470 - (p.L * scale / 2);
  const Bx = 470 + (p.L * scale / 2);
  const Gx = Ax + (p.df_m * scale);

  // GROUND
  ctx.strokeStyle = "#4a607e"; ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(940, groundY); ctx.stroke();

  // CAR BODY (Simplified)
  ctx.fillStyle = "#1e3a5f"; ctx.roundRect(Ax-50, groundY-100, (Bx-Ax)+100, 60, 10); ctx.fill();

  // TIERED DIMENSIONS (Strictly Non-Overlapping)
  const tier1 = groundY + 40;
  const tier2 = groundY + 85;

  ctx.setLineDash([5, 5]); ctx.strokeStyle = "#a78bfa";
  
  // df Tier
  ctx.beginPath(); ctx.moveTo(Ax, groundY); ctx.lineTo(Ax, tier1 + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Gx, groundY); ctx.lineTo(Gx, tier1 + 10); ctx.stroke();
  ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(Ax, tier1); ctx.lineTo(Gx, tier1); ctx.stroke();
  ctx.fillText(`df: ${p.df_m}m`, (Ax+Gx)/2, tier1 - 5);

  // dr Tier
  ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(Bx, groundY); ctx.lineTo(Bx, tier1 + 10); ctx.stroke();
  ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(Gx, tier1); ctx.lineTo(Bx, tier1); ctx.stroke();
  ctx.fillText(`dr: ${p.dr_m}m`, (Gx+Bx)/2, tier1 - 5);

  // Total L Tier (Lower Tier to avoid collision)
  ctx.strokeStyle = "#38bdf8"; ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(Ax, tier1 + 10); ctx.lineTo(Ax, tier2 + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Bx, tier1 + 10); ctx.lineTo(Bx, tier2 + 10); ctx.stroke();
  ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(Ax, tier2); ctx.lineTo(Bx, tier2); ctx.stroke();
  ctx.fillText(`Total L: ${p.L}m`, 470, tier2 - 5);

  // FORCES (Only for FBD)
  if(currentTab === 'fbd') {
    drawArrow(Gx, groundY-70, Gx, groundY+30, "#fb7185", "W");
    drawArrow(Ax, groundY, Ax, groundY-80, "#34d399", "Nf");
    drawArrow(Bx, groundY, Bx, groundY-80, "#fbbf24", "Nr");
  }
}

function drawArrow(x1,y1,x2,y2,col,lbl){
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.fillText(lbl, x2+10, y2);
}

function animate(){
  let start = null;
  function step(timestamp){
    if(!start) start = timestamp;
    let progress = Math.min((timestamp - start)/1000, 1);
    draw(progress);
    if(progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

document.getElementById('solveBtn').onclick = solve;
document.querySelectorAll('.tab').forEach(t => t.onclick = (e) => {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentTab = e.target.dataset.tab;
  if(currentData) draw(1);
});
</script>
</body>
</html>
