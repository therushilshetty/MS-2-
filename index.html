<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StaticsMaster · Car Equilibrium</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══ CORE THEME ══ */
:root{
  --bg:#07090f;--surface:#0d1117;--surface2:#111827;--surface3:#162033;
  --border:rgba(56,189,248,.13);--divider:rgba(56,189,248,.07);
  --text:#e2eeff;--muted:#8ba3c9;--faint:#4a607e;
  --cyan:#38bdf8;--cyan-glow:rgba(56,189,248,.18);
  --violet:#a78bfa;--violet-glow:rgba(167,139,250,.15);
  --orange:#fb923c;--orange-glow:rgba(251,146,60,.15);
  --green:#34d399;--green-glow:rgba(52,211,153,.14);
  --rose:#fb7185;--rose-glow:rgba(251,113,133,.13);
  --yellow:#fbbf24;
  --grid-line:rgba(56,189,248,.04);
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --r-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{height:56px;padding:0 24px;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--violet));border-radius:8px;display:grid;place-items:center;font-weight:bold;font-size:12px;color:white}
.layout{display:grid;grid-template-columns:350px 1fr;height:calc(100vh - 56px)}
.sidebar{padding:20px;background:rgba(13,17,23,0.8);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;gap:15px}
.main-col{padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
input{width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:white;font-family:var(--mono);font-size:13px}
input:focus{border-color:var(--cyan);outline:none}
.solve-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--cyan),var(--violet));border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer;margin-top:10px}
.canvas-container{position:relative;background:#000;border-radius:15px;border:1px solid var(--border);overflow:hidden}
canvas{display:block;width:100%;height:auto}
.case-banner{padding:10px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.cb-rose{background:var(--rose-glow);border:1px solid var(--rose);color:var(--rose);display:block}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.res-box{background:var(--surface2);padding:12px;border-radius:10px;border:1px solid var(--border);text-align:center}
.res-label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.res-val{font-family:var(--mono);font-weight:bold;color:var(--cyan)}
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="logo">SM</div>
    <span style="font-weight:bold; letter-spacing:-0.5px">StaticsMaster Pro</span>
  </div>
  <div id="modeTag" style="font-size:10px; color:var(--cyan); border:1px solid var(--cyan); padding:2px 8px; border-radius:20px">NUMERIC</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="card">
      <div style="font-size:12px; font-weight:bold; color:var(--muted); text-transform:uppercase">Dimensions (mm)</div>
      <div class="field-row">
        <div><label style="font-size:10px">Axle A → G</label><input id="inp_df" value="1386"></div>
        <div><label style="font-size:10px">G → Axle B</label><input id="inp_dr" value="964"></div>
      </div>
      <div style="font-size:12px; font-weight:bold; color:var(--muted); text-transform:uppercase; margin-top:15px">Physics</div>
      <div class="field-row">
        <div><label style="font-size:10px">Mass (kg)</label><input id="inp_mass" value="1400"></div>
        <div><label style="font-size:10px">Gravity (m/s²)</label><input id="inp_g" value="9.81"></div>
      </div>
      <button class="solve-btn" onclick="solve()">⚡ Compute Equilibrium</button>
    </div>

    <div class="card" id="resCard" style="display:none">
      <div id="caseBanner"></div>
      <div class="result-grid">
        <div class="res-box"><div class="res-label">Weight</div><div class="res-val" id="r_W">-</div></div>
        <div class="res-box"><div class="res-label">Wheelbase</div><div class="res-val" id="r_L">-</div></div>
        <div class="res-box"><div class="res-label">Force Nf</div><div class="res-val" id="r_Nf">-</div></div>
        <div class="res-box"><div class="res-label">Force Nr</div><div class="res-val" id="r_Nr">-</div></div>
      </div>
    </div>
  </aside>

  <main class="main-col">
    <div class="canvas-container">
      <canvas id="fbdCanvas" width="940" height="500"></canvas>
    </div>
  </main>
</div>

<script>
const canvas = document.getElementById('fbdCanvas');
const ctx = canvas.getContext('2d');
let currentData = null;

function solve() {
    const df = parseFloat(document.getElementById('inp_df').value);
    const dr = parseFloat(document.getElementById('inp_dr').value);
    const m = parseFloat(document.getElementById('inp_mass').value);
    const g = parseFloat(document.getElementById('inp_g').value);

    if (isNaN(df) || isNaN(dr) || isNaN(m) || isNaN(g)) return;

    const L = (df + dr) / 1000;
    const W = m * g;
    const isImpossible = m < 0 || L < 0 || g < 0;

    currentData = {
        df_m: df/1000, dr_m: dr/1000, L, m, g, W,
        Nf: L !== 0 ? (W * (dr/1000)) / L : 0,
        Nr: L !== 0 ? (W * (df/1000)) / L : 0,
        isImpossible,
        reason: m < 0 ? "Mass cannot be negative." : L < 0 ? "Wheelbase cannot be negative." : g < 0 ? "Gravity magnitude must be positive." : ""
    };

    document.getElementById('resCard').style.display = 'block';
    const banner = document.getElementById('caseBanner');
    if(isImpossible) {
        banner.className = "case-banner cb-rose";
        banner.innerHTML = `<strong>Not Possible:</strong> ${currentData.reason}`;
    } else {
        banner.style.display = 'none';
        document.getElementById('r_W').textContent = W.toFixed(1) + ' N';
        document.getElementById('r_L').textContent = L.toFixed(3) + ' m';
        document.getElementById('r_Nf').textContent = currentData.Nf.toFixed(1) + ' N';
        document.getElementById('r_Nr').textContent = currentData.Nr.toFixed(1) + ' N';
    }

    animate();
}

function draw(t) {
    const p = currentData;
    ctx.clearRect(0,0,940,500);
    
    if(p.isImpossible) {
        ctx.fillStyle = "#fb7185";
        ctx.font = "bold 20px Space Grotesk";
        ctx.textAlign = "center";
        ctx.fillText("❌ PHYSICAL IMPOSSIBILITY DETECTED", 470, 250);
        return;
    }

    const groundY = 350;
    const scale = 220; 
    const Ax = 470 - (p.L * scale / 2);
    const Bx = 470 + (p.L * scale / 2);
    const Gx = Ax + (p.df_m * scale);

    // Ground line
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(50, groundY); ctx.lineTo(890, groundY); ctx.stroke();

    // Car Body
    ctx.fillStyle = "#1e3a5f";
    ctx.roundRect(Ax-60, groundY-110, (Bx-Ax)+120, 60, 15);
    ctx.fill();

    // Side Dotted Lines & Dimensions
    const t1 = groundY + 40;
    const t2 = groundY + 85;

    ctx.setLineDash([5, 5]); ctx.lineWidth = 1; ctx.strokeStyle = "#a78bfa";
    // Axle A Side Dotted
    ctx.beginPath(); ctx.moveTo(Ax, groundY); ctx.lineTo(Ax, t1 + 10); ctx.stroke();
    // Center G Side Dotted
    ctx.beginPath(); ctx.moveTo(Gx, groundY); ctx.lineTo(Gx, t1 + 10); ctx.stroke();
    // Axle B Side Dotted
    ctx.beginPath(); ctx.moveTo(Bx, groundY); ctx.lineTo(Bx, t1 + 10); ctx.stroke();

    ctx.setLineDash([]);
    // df line
    ctx.beginPath(); ctx.moveTo(Ax, t1); ctx.lineTo(Gx, t1); ctx.stroke();
    // dr line
    ctx.beginPath(); ctx.moveTo(Gx, t1); ctx.lineTo(Bx, t1); ctx.stroke();

    ctx.fillStyle = "#a78bfa"; ctx.font = "bold 11px Space Mono"; ctx.textAlign="center";
    ctx.fillText(`df: ${p.df_m.toFixed(3)}m`, (Ax+Gx)/2, t1 - 8);
    ctx.fillText(`dr: ${p.dr_m.toFixed(3)}m`, (Gx+Bx)/2, t1 - 8);

    // Total Wheelbase Side Lines
    ctx.setLineDash([5, 5]); ctx.strokeStyle = "#38bdf8";
    ctx.beginPath(); ctx.moveTo(Ax, t1+10); ctx.lineTo(Ax, t2+10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(Bx, t1+10); ctx.lineTo(Bx, t2+10); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(Ax, t2); ctx.lineTo(Bx, t2); ctx.stroke();
    ctx.fillStyle = "#38bdf8";
    ctx.fillText(`Wheelbase L: ${p.L.toFixed(3)}m`, 470, t2 - 8);

    // Forces with GLOW at Tips
    const fLen = 100 * t;
    drawGlowArrow(Gx, groundY-80, Gx, groundY-80 + fLen, "#fb7185", "W", "down");
    drawGlowArrow(Ax, groundY, Ax, groundY - fLen, "#34d399", "Nf", "up");
    drawGlowArrow(Bx, groundY, Bx, groundY - fLen, "#fbbf24", "Nr", "Nr", "up");
}

function drawGlowArrow(x1, y1, x2, y2, color, label, dir) {
    // Arrow Shaft
    ctx.strokeStyle = color; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

    // GLOW TIP EFFECT
    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    
    // Arrow Head
    const sz = 12;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    if(dir === "up") {
        ctx.lineTo(x2-sz, y2+sz); ctx.lineTo(x2+sz, y2+sz);
    } else {
        ctx.lineTo(x2-sz, y2-sz); ctx.lineTo(x2+sz, y2-sz);
    }
    ctx.fill();
    ctx.restore();

    // Label
    ctx.fillStyle = "white"; ctx.font = "bold 14px Space Mono";
    ctx.fillText(label, x2 + 20, y2 + (dir==="up"?5:0));
}

function animate() {
    let start = null;
    function step(ts) {
        if(!start) start = ts;
        let progress = Math.min((ts - start)/800, 1);
        draw(progress);
        if(progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// Initial draw
ctx.fillStyle = "#4a607e"; ctx.textAlign="center"; ctx.font="14px Space Grotesk";
ctx.fillText("Click Compute to see the FBD", 470, 250);
</script>
</body>
</html>
